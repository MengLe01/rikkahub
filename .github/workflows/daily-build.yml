name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 发布 Release 需要写权限

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # web 模块的 preBuild 会执行 pnpm run build，因此需要准备 Node 和 pnpm
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret 未配置"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/airhub-release.jks"

      - name: Gradle Build
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/airhub-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        id: apk
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Release APK not found"
            exit 1
          fi

          renamed_path="app/build/outputs/apk/release/airhub_${short_sha}.apk"
          mv "$apk_path" "$renamed_path"
          echo "path=$renamed_path" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: nightly
          name: Development Build
          prerelease: true
          body: |
            手动构建（commit ${{ github.sha }}）。

            > ⚠️ 开发版本，可能不稳定，仅供测试。
          files: ${{ steps.apk.outputs.path }}
